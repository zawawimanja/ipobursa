name: Update Daily IPO Data

on:
  schedule:
    # 00:45 UTC = 8:45 AM Malaysia Time (Market open). Runs Monday to Friday.
    - cron: '45 0 * * 1-5'
    # 05:30 UTC = 1:30 PM Malaysia Time (Lunch break). Runs Monday to Friday.
    - cron: '30 5 * * 1-5'
    # 09:30 UTC = 5:30 PM Malaysia Time (Market close). Runs Monday to Friday.
    - cron: '30 9 * * 1-5'
  workflow_dispatch: # Allows manual click run

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
          
      - name: Run Scrapers (iSaham + i3investor), Recalculate Targets, and Archive Daily Groups
        run: |
          node sync-isaham.js
          node scrape-i3.js
          node scratch/calc_sifu_targets.js
          node archive-groups.js
        
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data.js archive/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update: Daily IPO market data and group archive" && git push)
